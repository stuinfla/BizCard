<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Card -->
  <rect x="100" y="96" width="312" height="340" rx="28" fill="#ffffff"/>

  <!-- Banner -->
  <rect x="100" y="96" width="312" height="80" rx="28" fill="url(#btn)"/>
  <rect x="100" y="148" width="312" height="28" fill="url(#btn)"/>

  <!-- Avatar -->
  <circle cx="256" cy="176" r="44" fill="#ffffff"/>
  <circle cx="256" cy="176" r="40" fill="#6366f1"/>
  <circle cx="256" cy="167" r="14" fill="#ffffff"/>
  <ellipse cx="256" cy="198" rx="22" ry="14" fill="#ffffff"/>

  <!-- Name bar -->
  <rect x="186" y="230" width="140" height="14" rx="7" fill="#1e1b4b" opacity="0.7"/>

  <!-- Title bar -->
  <rect x="206" y="254" width="100" height="10" rx="5" fill="#1e1b4b" opacity="0.25"/>

  <!-- Contact grid -->
  <rect x="128" y="280" width="116" height="32" rx="10" fill="#6366f1" opacity="0.15"/>
  <rect x="268" y="280" width="116" height="32" rx="10" fill="#34d399" opacity="0.2"/>
  <rect x="128" y="320" width="116" height="32" rx="10" fill="#34d399" opacity="0.15"/>
  <rect x="268" y="320" width="116" height="32" rx="10" fill="#6366f1" opacity="0.15"/>

  <!-- Icon dots -->
  <circle cx="146" cy="296" r="7" fill="#6366f1" opacity="0.5"/>
  <circle cx="286" cy="296" r="7" fill="#34d399" opacity="0.6"/>
  <circle cx="146" cy="336" r="7" fill="#34d399" opacity="0.5"/>
  <circle cx="286" cy="336" r="7" fill="#6366f1" opacity="0.5"/>

  <!-- CTA button -->
  <rect x="148" y="368" width="216" height="42" rx="14" fill="url(#btn)"/>
  <rect x="190" y="384" width="132" height="10" rx="5" fill="#ffffff" opacity="0.65"/>

  <!-- Share badge -->
  <circle cx="388" cy="108" r="36" fill="#ffffff"/>
  <circle cx="388" cy="108" r="32" fill="#6366f1"/>
  <rect x="376" y="106" width="24" height="18" rx="3" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <line x1="388" y1="112" x2="388" y2="95" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="381,101 388,94 395,101" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>