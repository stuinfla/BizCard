<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f0f0f5" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Card shape -->
  <rect x="96" y="120" width="320" height="280" rx="24" fill="url(#card)" opacity="0.95"/>
  <!-- Avatar circle -->
  <circle cx="256" cy="195" r="42" fill="#818cf8" opacity="0.9"/>
  <circle cx="256" cy="195" r="36" fill="#ffffff"/>
  <circle cx="256" cy="195" r="30" fill="#818cf8" opacity="0.3"/>
  <!-- Name line -->
  <rect x="176" y="252" width="160" height="12" rx="6" fill="#1a1a2e" opacity="0.7"/>
  <!-- Title line -->
  <rect x="196" y="274" width="120" height="8" rx="4" fill="#1a1a2e" opacity="0.3"/>
  <!-- Contact rows -->
  <rect x="136" y="304" width="100" height="28" rx="8" fill="#818cf8" opacity="0.15"/>
  <rect x="276" y="304" width="100" height="28" rx="8" fill="#34d399" opacity="0.15"/>
  <rect x="136" y="342" width="100" height="28" rx="8" fill="#818cf8" opacity="0.1"/>
  <rect x="276" y="342" width="100" height="28" rx="8" fill="#34d399" opacity="0.1"/>
  <!-- Share arrow (bottom right) -->
  <g transform="translate(390, 90)">
    <circle cx="0" cy="0" r="36" fill="#ffffff" opacity="0.25"/>
    <path d="M-12 6 L0 -10 L12 6 M0 -8 L0 14" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>