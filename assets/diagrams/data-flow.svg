<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <style>
      .box { fill: #1a1a3e; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .box-accent { fill: #1e293b; stroke: #a78bfa; stroke-width: 2; rx: 12; }
      .label { fill: #94a3b8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
      .title { fill: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 700; }
      .desc { fill: #94a3b8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .arrow { stroke: #60a5fa; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-down { stroke: #a78bfa; stroke-width: 2; fill: none; marker-end: url(#arrowhead-purple); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>
  <rect width="900" height="520" fill="#0a0a1a" rx="16"/>
  <!-- Labels -->
  <text x="140" y="35" class="label" text-anchor="middle">Creator</text>
  <text x="760" y="35" class="label" text-anchor="middle">Recipient</text>
  <!-- Row 1: Encode flow -->
  <rect x="30" y="55" width="210" height="80" class="box"/>
  <text x="135" y="85" class="title" text-anchor="middle">Fill out form</text>
  <text x="135" y="105" class="desc" text-anchor="middle">name, phone, email, etc.</text>
  <line x1="240" y1="95" x2="290" y2="95" class="arrow"/>
  <rect x="300" y="55" width="210" height="80" class="box"/>
  <text x="405" y="80" class="title" text-anchor="middle">JSON object</text>
  <text x="405" y="100" class="desc" text-anchor="middle">{n:&quot;Jane&quot;, ph:&quot;555...&quot;,</text>
  <text x="405" y="116" class="desc" text-anchor="middle">em:&quot;j@co.com&quot;}</text>
  <line x1="510" y1="95" x2="560" y2="95" class="arrow"/>
  <rect x="570" y="55" width="210" height="80" class="box-accent"/>
  <text x="675" y="85" class="title" text-anchor="middle">Base64 encode</text>
  <text x="675" y="105" class="desc" text-anchor="middle">btoa(JSON.stringify(data))</text>
  <!-- Down arrow -->
  <line x1="675" y1="135" x2="675" y2="185" class="arrow-down"/>
  <!-- Row 2: URL + QR -->
  <rect x="570" y="195" width="290" height="90" class="box-accent"/>
  <text x="715" y="225" class="title" text-anchor="middle">URL with hash</text>
  <text x="715" y="248" class="desc" text-anchor="middle">bizcard-gen.netlify.app</text>
  <text x="715" y="268" class="desc" text-anchor="middle">/#card=eyJuIjoi...</text>
  <!-- Down arrow to QR -->
  <line x1="715" y1="285" x2="715" y2="335" class="arrow-down"/>
  <rect x="610" y="345" width="210" height="80" class="box"/>
  <text x="715" y="375" class="title" text-anchor="middle">QR code generated</text>
  <text x="715" y="395" class="desc" text-anchor="middle">via qrserver.com API</text>
  <!-- Left arrow from URL to decode -->
  <line x1="570" y1="240" x2="520" y2="240" class="arrow"/>
  <!-- Row 2 left: Decode -->
  <rect x="300" y="195" width="210" height="90" class="box"/>
  <text x="405" y="225" class="title" text-anchor="middle">JSON decoded</text>
  <text x="405" y="248" class="desc" text-anchor="middle">from base64 in</text>
  <text x="405" y="268" class="desc" text-anchor="middle">URL hash</text>
  <line x1="300" y1="240" x2="250" y2="240" class="arrow"/>
  <!-- Card renders -->
  <rect x="30" y="195" width="210" height="90" class="box"/>
  <text x="135" y="222" class="title" text-anchor="middle">Card renders</text>
  <text x="135" y="245" class="desc" text-anchor="middle">clickable contacts, QR,</text>
  <text x="135" y="265" class="desc" text-anchor="middle">save/share buttons</text>
  <!-- Summary bar -->
  <rect x="30" y="460" width="840" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="450" y="485" class="desc" text-anchor="middle" fill="#60a5fa">Your data lives in the URL. No server, no database, no middleman.</text>
</svg>