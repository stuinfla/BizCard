<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <style>
      .box { fill: #1a1a3e; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .box-red { fill: #2a0f0f; stroke: #ef4444; stroke-width: 2; rx: 12; }
      .box-green { fill: #0f2a1a; stroke: #22c55e; stroke-width: 2; rx: 12; }
      .box-dark { fill: #1e1e1e; stroke: #ef4444; stroke-width: 2; rx: 12; }
      .section-label { fill: #94a3b8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
      .title { fill: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 700; }
      .desc { fill: #94a3b8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .warn { fill: #fca5a5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; }
      .good { fill: #86efac; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; }
      .arrow-red { stroke: #ef4444; stroke-width: 2; fill: none; marker-end: url(#ah-red); }
      .arrow-green { stroke: #22c55e; stroke-width: 2.5; fill: none; marker-end: url(#ah-green); }
      .divider { stroke: #334155; stroke-width: 1; stroke-dasharray: 6,4; }
    </style>
    <marker id="ah-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
    <marker id="ah-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
  </defs>
  <rect width="900" height="500" fill="#0a0a1a" rx="16"/>
  <!-- Section 1: Traditional -->
  <text x="450" y="30" class="section-label" text-anchor="middle" fill="#ef4444">Traditional Digital Card Services</text>
  <!-- You -->
  <rect x="30" y="55" width="120" height="60" class="box"/>
  <text x="90" y="90" class="title" text-anchor="middle">You</text>
  <line x1="150" y1="85" x2="220" y2="85" class="arrow-red"/>
  <!-- Company Server -->
  <rect x="230" y="55" width="180" height="60" class="box-red"/>
  <text x="320" y="90" class="title" text-anchor="middle">Company Server</text>
  <line x1="410" y1="85" x2="480" y2="85" class="arrow-red"/>
  <!-- Company Database -->
  <rect x="490" y="55" width="180" height="60" class="box-red"/>
  <text x="580" y="90" class="title" text-anchor="middle">Company Database</text>
  <line x1="670" y1="85" x2="740" y2="85" class="arrow-red"/>
  <!-- ??? -->
  <rect x="750" y="55" width="120" height="60" class="box-dark"/>
  <text x="810" y="90" class="title" text-anchor="middle" fill="#ef4444">???</text>
  <!-- Warning text -->
  <text x="580" y="140" class="warn" text-anchor="middle">Your name, phone, email, address, employer,</text>
  <text x="580" y="158" class="warn" text-anchor="middle">social profiles — ALL stored on servers you don't control</text>
  <!-- Risk list -->
  <line x1="580" y1="115" x2="580" y2="170" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="350" y="180" width="460" height="80" rx="8" fill="#1a0a0a" stroke="#ef4444" stroke-width="1"/>
  <text x="580" y="203" class="warn" text-anchor="middle">Data sold to advertisers?  Exposed in a breach?</text>
  <text x="580" y="222" class="warn" text-anchor="middle">Lost when service shuts down?  Used to profile you?</text>
  <text x="580" y="244" class="title" text-anchor="middle" fill="#ef4444">You have no idea &amp; no control</text>
  <!-- Divider -->
  <line x1="50" y1="290" x2="850" y2="290" class="divider"/>
  <!-- Section 2: BizCard -->
  <text x="450" y="320" class="section-label" text-anchor="middle" fill="#22c55e">BizCard</text>
  <!-- You -->
  <rect x="150" y="345" width="140" height="70" class="box-green"/>
  <text x="220" y="385" class="title" text-anchor="middle" fill="#22c55e">You</text>
  <!-- Big green arrow -->
  <line x1="290" y1="380" x2="510" y2="380" class="arrow-green"/>
  <text x="400" y="370" class="desc" text-anchor="middle" fill="#22c55e">URL (direct)</text>
  <!-- Recipient -->
  <rect x="520" y="345" width="140" height="70" class="box-green"/>
  <text x="590" y="385" class="title" text-anchor="middle" fill="#22c55e">Recipient</text>
  <!-- Summary -->
  <rect x="150" y="440" width="510" height="36" rx="8" fill="#0f2a1a" stroke="#22c55e" stroke-width="1"/>
  <text x="405" y="463" class="good" text-anchor="middle">No middleman. No server. No database. Your data lives in the URL.</text>
</svg>